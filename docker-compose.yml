services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ci_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ci
      POSTGRES_PASSWORD: ci
      POSTGRES_DB: codebase_investigator
    ports:
      - "5433:5432"
    volumes:
      - ci_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ci -d codebase_investigator"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ci_pgdata:
